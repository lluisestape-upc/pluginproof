<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PluginProof</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    /* Bench-instrument faceplate. One committed visual world. */
    :root{
      color-scheme:dark;
      --room:#101214;          /* the bench */
      --chassis:#1B1F22;       /* anodized faceplate */
      --chassis-hi:#2A3034;
      --chassis-lo:#0C0E10;
      --glass:#070B08;         /* CRT glass */
      --phos:#3EF29B;          /* phosphor */
      --phos-dim:#1F8A58;
      --engrave:#9AA6A0;       /* silk-screened labels */
      --engrave-dim:#5C666B;
      --led-red:#FF4757;
      --mono:'JetBrains Mono','Cascadia Code',Consolas,monospace;
      --label:'Inter','Segoe UI',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--room);color:var(--engrave);font-family:var(--label);
         display:grid;place-items:center;padding:26px}
    main{width:min(980px,100%)}
    .hidden{display:none!important}
    .mono{font-family:var(--mono)}

    /* ── chassis ── */
    #launcher,#report-view{display:block;border-radius:10px;position:relative;
      background:linear-gradient(180deg,var(--chassis-hi) 0%,var(--chassis) 7%,var(--chassis) 93%,var(--chassis-lo) 100%);
      box-shadow:0 22px 50px rgba(0,0,0,.6),0 2px 0 rgba(255,255,255,.04) inset;
      padding:18px 26px 24px}
    #launcher::before,#launcher::after,#report-view::before,#report-view::after{
      content:'';position:absolute;width:13px;height:13px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%,#3a4146,#14171a 70%);
      box-shadow:0 1px 1px rgba(255,255,255,.06),0 0 3px rgba(0,0,0,.8) inset}
    #launcher::before,#report-view::before{top:10px;left:12px}
    #launcher::after,#report-view::after{top:10px;right:12px}

    /* ── nameplate ── */
    h1{font-size:17px;font-weight:700;letter-spacing:.02em;color:#C7D2D6;display:inline-block;
       text-shadow:0 1px 0 rgba(0,0,0,.9)}
    h1 .brand{color:var(--phos)}
    h1::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;
       background:var(--phos);box-shadow:0 0 6px var(--phos);margin-right:9px;vertical-align:1px}
    #launcher>p{display:inline-block;font-size:10.5px;letter-spacing:.24em;color:var(--engrave-dim);
       text-transform:uppercase;margin-left:14px;vertical-align:1px}
    #launcher>h1,#launcher>p{border-bottom:none}
    #launcher>p::after{content:'· MODEL PP-01';font-family:var(--mono);letter-spacing:.1em;margin-left:10px}

    /* ── the screen (drop zone) ── */
    #drop-zone{margin-top:16px;border-radius:8px;padding:10px;cursor:default;
      background:linear-gradient(180deg,#0e1113,#181c1f);
      box-shadow:0 1px 0 rgba(255,255,255,.05),0 3px 10px rgba(0,0,0,.55) inset}
    #drop-zone>*{position:relative;z-index:1}
    #drop-zone{position:relative;text-align:center}
    #drop-zone::before{content:'';position:absolute;inset:10px;border-radius:5px;
      background:radial-gradient(120% 140% at 50% 10%,#0b120c 0%,var(--glass) 60%);
      box-shadow:0 0 24px rgba(0,0,0,.9) inset,0 0 40px rgba(62,242,155,.05) inset}
    #drop-zone::after{content:'';position:absolute;inset:10px;border-radius:5px;pointer-events:none;
      background:repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0 1px,transparent 1px 3px),
                 radial-gradient(90% 70% at 50% 45%,transparent 55%,rgba(0,0,0,.5) 100%)}
    #drop-zone strong{display:block;padding:44px 20px 6px;font-family:var(--mono);font-weight:400;
      font-size:16.5px;letter-spacing:.06em;color:var(--phos);text-shadow:0 0 6px rgba(62,242,155,.55)}
    #drop-zone p{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
      color:var(--phos-dim);margin-top:6px}
    #drop-zone.drag::before{box-shadow:0 0 24px rgba(0,0,0,.9) inset,0 0 60px rgba(62,242,155,.22) inset}
    #drop-zone.busy{opacity:.85}
    #drop-zone .brand{color:var(--phos)}

    /* ── keys ── */
    button{font-family:var(--label);font-weight:600;font-size:12px;letter-spacing:.12em;
      text-transform:uppercase;color:#CBD5D9;padding:10px 22px;border-radius:5px;cursor:pointer;border:0;
      background:linear-gradient(180deg,#2E3439,#22272B 45%,#1B2023);
      box-shadow:0 1px 0 rgba(255,255,255,.09) inset,0 3px 0 #101315,0 5px 8px rgba(0,0,0,.5)}
    button:active{transform:translateY(2px);
      box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 1px 0 #101315}
    button:disabled{opacity:.4;cursor:not-allowed}
    button:focus-visible{outline:2px solid var(--phos);outline-offset:2px}
    #browse{margin:18px 0 40px}
    #check{color:#08130D;background:linear-gradient(180deg,#5DF7B1,#2FD98B 55%,#1FB873);
      box-shadow:0 1px 0 rgba(255,255,255,.35) inset,0 3px 0 #0E7A4C,0 5px 10px rgba(0,0,0,.5)}
    #check:active{box-shadow:0 1px 0 rgba(255,255,255,.25) inset,0 1px 0 #0E7A4C}
    #actions{display:flex;gap:14px;margin-top:16px}

    /* ── annunciator line ── */
    #status{min-height:24px;margin-top:16px;font-family:var(--mono);font-size:12px;
      letter-spacing:.06em;color:var(--phos-dim)}
    .spinner{display:inline-block;width:11px;height:11px;margin-right:8px;vertical-align:-1px;
      border:2px solid var(--engrave-dim);border-top-color:var(--phos);border-radius:50%;
      animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (prefers-reduced-motion:reduce){.spinner{animation-duration:1.6s}}

    /* ── service panel (settings) ── */
    #settings-toggle{float:right;margin:0;padding:6px 12px;font-size:14px;color:var(--engrave)}
    #settings{margin-top:16px;padding:14px 16px 18px;border-radius:6px;
      background:linear-gradient(180deg,#171B1E,#14181B);
      box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 2px 8px rgba(0,0,0,.45) inset}
    #settings strong{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--engrave-dim)}
    #settings label{display:block;color:var(--engrave-dim);font-size:10px;letter-spacing:.18em;
      text-transform:uppercase;margin-top:12px}
    #settings input,#settings select{width:100%;margin-top:5px;padding:9px 10px;border-radius:4px;
      font-family:var(--mono);font-size:13px;color:var(--phos);background:var(--glass);
      border:1px solid #23282c;box-shadow:0 2px 6px rgba(0,0,0,.5) inset}
    #settings input:focus,#settings select:focus{outline:1px solid var(--phos-dim)}
    #settings button{margin-top:16px}
    .settings-note{font-family:var(--mono);font-size:11.5px;margin-top:10px;color:var(--phos-dim)}

    /* ── report view ── */
    #new-check{margin:0 0 12px}
    #report{display:none;width:100%;height:calc(100vh - 160px);border:0;border-radius:6px;
      background:var(--glass);padding:0;
      box-shadow:0 2px 10px rgba(0,0,0,.55) inset}
  </style>
</head>
<body><main>
  <section id="launcher"><button id="settings-toggle" title="AI settings" aria-label="AI settings">&#9881;</button><h1>Plugin<span class="brand">Proof</span></h1><p>Audio Regression Analyzer</p>
    <section id="settings" class="hidden"><strong>AI diagnosis &mdash; service panel</strong><label>Provider<select id="provider"><option value="openai">OpenAI</option><option value="anthropic">Anthropic</option><option value="ollama">Ollama (local)</option><option value="off">Off (rule-based)</option></select></label><label>API key<input id="api-key" type="password" autocomplete="off"></label><label>Model<input id="model" type="text"></label><button id="save-settings">Save</button><p id="settings-status" class="settings-note"></p></section>
    <div id="drop-zone"><strong>INSERT DEVICE UNDER TEST</strong><p>drop a <span class="brand mono">.vst3</span> on the screen &nbsp;&middot;&nbsp; or press load</p><button id="browse">Load VST3</button></div>
    <div id="status" role="status">Drop a .vst3 file to begin.</div>
    <div id="actions" class="hidden"><button id="golden">Set Golden</button><button id="check" class="secondary">Check</button></div>
  </section>
  <section id="report-view" class="hidden"><button id="new-check" class="secondary">&larr; New check</button><iframe id="report" title="PluginProof report"></iframe></section>
</main>
<script>
const api=()=>window.pywebview.api, zone=document.querySelector('#drop-zone'), status=document.querySelector('#status'), actions=document.querySelector('#actions'), report=document.querySelector('#report'), launcher=document.querySelector('#launcher'), reportView=document.querySelector('#report-view');
const provider=document.querySelector('#provider'), apiKey=document.querySelector('#api-key'), model=document.querySelector('#model'), settings=document.querySelector('#settings'), settingsStatus=document.querySelector('#settings-status');
let polling;
function message(text,busy=false){status.innerHTML=(busy?'<span class="spinner"></span>':'')+text;zone.classList.toggle('busy',busy)}
function result(r){if(!r.ok&&!r.cancelled)message(r.error||'Something went wrong.');return r}
async function begin(path){const r=result(await api().start_measurement(path));if(r.ok){message('Starting measurement...',true);actions.classList.add('hidden')}}
function poll(){if(polling)return;polling=setInterval(async()=>{const s=await api().state();message(s.message,s.phase==='measuring');actions.classList.toggle('hidden',s.phase!=='ready');if(s.phase==='report'&&s.report_url)showReport(s.report_url)},450)}
function showReport(url){if(report.src!==url)report.src=url;launcher.classList.add('hidden');reportView.classList.remove('hidden');report.style.display='block'}
document.querySelector('#browse').onclick=async()=>{const r=result(await api().pick_plugin());if(r.ok){message('Starting measurement...',true);actions.classList.add('hidden')}};
document.querySelector('#golden').onclick=async()=>{const r=result(await api().set_golden());if(r.ok)message('Golden baseline saved. You can now run Check.')};
document.querySelector('#check').onclick=async()=>{const r=result(await api().check());if(r.ok){message('Re-measuring plugin for regression check...',true);actions.classList.add('hidden')}};
document.querySelector('#new-check').onclick=async()=>{const r=result(await api().new_check());if(r.ok){report.removeAttribute('src');report.style.display='none';reportView.classList.add('hidden');launcher.classList.remove('hidden');const s=await api().state();message(s.message);actions.classList.toggle('hidden',s.phase!=='ready')}};
const defaultModels={openai:'gpt-5.6',anthropic:'claude-opus-4-8',ollama:'llama3.2',off:''};
document.querySelector('#settings-toggle').onclick=()=>settings.classList.toggle('hidden');
provider.onchange=()=>{model.value=defaultModels[provider.value];apiKey.disabled=provider.value==='ollama'||provider.value==='off'};
document.querySelector('#save-settings').onclick=async()=>{const r=await api().save_settings({provider:provider.value,api_key:apiKey.value,model:model.value});settingsStatus.textContent=r.ok?'Settings saved.':r.error||'Could not save settings.'};
['dragenter','dragover'].forEach(e=>zone.addEventListener(e,x=>{x.preventDefault();zone.classList.add('drag')}));['dragleave','drop'].forEach(e=>zone.addEventListener(e,x=>{x.preventDefault();zone.classList.remove('drag')}));zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag')});
window.addEventListener('pywebviewready',async()=>{poll();const s=await api().settings();provider.value=s.provider;apiKey.value=s.api_key;model.value=s.model;apiKey.disabled=s.provider==='ollama'||s.provider==='off'});
</script></body></html>
