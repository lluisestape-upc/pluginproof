<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{plugin_name}} - PluginProof Report</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-deep: #0F1115;
            --bg-surface: #1A1D24;
            --bg-surface-hover: #21252D;
            --border-color: #2A303A;
            --accent: #00FF9D;
            --accent-glow: rgba(0, 255, 157, 0.2);
            --pass: #00FF9D;
            --warn: #FFB300;
            --fail: #FF3366;
            --text-primary: #E0E6ED;
            --text-secondary: #8A99A8;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(42, 48, 58, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(42, 48, 58, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-surface);
            padding: 1.5rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo svg {
            width: 40px;
            height: 40px;
        }

        .wordmark {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .plugin-name {
            font-family: var(--font-mono);
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding-left: 1.5rem;
            border-left: 2px solid var(--border-color);
        }

        .verdict-badge {
            font-family: var(--font-mono);
            font-weight: 700;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px currentColor;
        }

        .badge-pass { color: var(--bg-deep); background-color: var(--pass); }
        .badge-warn { color: var(--bg-deep); background-color: var(--warn); }
        .badge-fail { color: var(--bg-deep); background-color: var(--fail); }

        /* Section headings */
        h2.section {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--text-secondary);
            margin: 2rem 0 0.9rem;
            font-family: var(--font-mono);
        }

        /* Metric cards — styles the markup generated by pluginproof/report.py:
           .metric-card > .metric-name / .metric-values (.metric-baseline,
           .metric-arrow, .metric-current) / .metric-delta / .metric-status */
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: border-color 0.3s ease;
        }

        .metric-card:hover {
            border-color: var(--text-secondary);
        }

        .metric-name {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
        }

        .metric-values {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: 700;
        }

        .metric-baseline { color: var(--text-secondary); }
        .metric-arrow { color: var(--text-secondary); padding: 0 0.35rem; font-weight: 400; }
        .metric-current { color: var(--text-primary); }

        .metric-delta {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .metric-delta small { color: var(--text-secondary); font-weight: 400; }

        .metric-status {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            margin-top: 0.55rem;
            text-shadow: 0 0 10px currentColor;
        }

        /* Spectra — styles figure.spectrum generated by report.py */
        .spectra {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        figure.spectrum {
            background-color: #0A0C10;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        figure.spectrum::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 255, 157, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 157, 0.05) 1px, transparent 1px);
            background-size: 10% 25%;
            z-index: 0;
            pointer-events: none;
        }

        figure.spectrum img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            position: relative;
            z-index: 1;
        }

        figure.spectrum figcaption {
            font-family: var(--font-mono);
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 0.6rem;
            position: relative;
            z-index: 1;
        }

        /* Diagnosis Panel */
        .diagnosis-panel {
            background-color: var(--bg-surface);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 2rem;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-left: 4px solid var(--accent);
        }

        .diagnosis-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .diagnosis-header svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .diagnosis-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-primary);
        }

        footer.stamp {
            font-family: var(--font-mono);
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-top: 2rem;
            text-align: right;
        }

        @media (max-width: 1024px) {
            .metric-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 768px) {
            .metric-grid { grid-template-columns: 1fr; }
            .header-left { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .plugin-name { padding-left: 0; border-left: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo">
                    <svg viewBox="0 0 512 512">
                        <rect width="512" height="512" fill="#0F1115" rx="64"/>
                        <path d="M 256, 40 C 256, 40 400, 80 400, 200 C 400, 360 256, 460 256, 460 C 256, 460 112, 360 112, 200 C 112, 80 256, 40 256, 40 Z" fill="none" stroke="#2A303A" stroke-width="12" stroke-linejoin="round"/>
                        <rect x="170" y="240" width="16" height="80" rx="8" fill="#00FF9D" />
                        <rect x="210" y="200" width="16" height="120" rx="8" fill="#00FF9D" />
                        <rect x="250" y="140" width="16" height="180" rx="8" fill="#00FF9D" />
                        <path d="M 280, 260 L 310, 290 L 360, 180" fill="none" stroke="#00FF9D" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="wordmark">PluginProof</span>
                </div>
                <div class="plugin-name">Target: {{plugin_name}}</div>
            </div>
            <div class="verdict-badge badge-{{overall_status_class}}">
                {{overall_status}}
            </div>
        </header>

        <h2 class="section">Metrics</h2>
        <div class="metric-grid">
{{metric_cards}}
        </div>

        <h2 class="section">Spectra</h2>
        <div class="spectra">
{{spectra}}
        </div>

        <div class="diagnosis-panel">
            <div class="diagnosis-header">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span>AI Diagnosis (GPT-5.6)</span>
            </div>
            <div class="diagnosis-text">
                {{diagnosis}}
            </div>
        </div>

        <footer class="stamp">generated {{timestamp}} &middot; pluginproof</footer>
    </div>
</body>
</html>
