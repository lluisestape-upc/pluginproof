<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{plugin_name}} - PluginProof Report</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        /* Bench-instrument report: same chassis/CRT world as the app. */
        :root {
            --room: #101214;
            --chassis: #1B1F22;
            --chassis-hi: #2A3034;
            --chassis-lo: #0C0E10;
            --glass: #070B08;
            --phos: #3EF29B;
            --phos-dim: #1F8A58;
            --engrave: #9AA6A0;
            --engrave-dim: #5C666B;
            --pass: #2ee6a8;   /* matches report.py _STATUS_COLOR */
            --warn: #ffb454;
            --fail: #ff5470;
            --font-mono: 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
            --font-label: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--room);
            color: var(--engrave);
            font-family: var(--font-label);
            line-height: 1.6;
            padding: 1.6rem;
            min-height: 100vh;
        }

        /* chassis */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
            border-radius: 10px;
            background: linear-gradient(180deg, var(--chassis-hi) 0%, var(--chassis) 7%,
                                        var(--chassis) 93%, var(--chassis-lo) 100%);
            box-shadow: 0 22px 50px rgba(0,0,0,.6), 0 2px 0 rgba(255,255,255,.04) inset;
            padding: 18px 26px 24px;
        }
        .container::before, .container::after {
            content: ''; position: absolute; width: 13px; height: 13px; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #3a4146, #14171a 70%);
            box-shadow: 0 1px 1px rgba(255,255,255,.06), 0 0 3px rgba(0,0,0,.8) inset;
        }
        .container::before { top: 10px; left: 12px; }
        .container::after  { top: 10px; right: 12px; }

        /* nameplate */
        header {
            display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
            padding: 2px 4px 12px;
            border-bottom: 1px solid #14171a;
            box-shadow: 0 1px 0 rgba(255,255,255,.05);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo svg { width: 30px; height: 30px; }
        .wordmark {
            font-weight: 700; font-size: 16px; letter-spacing: .02em; color: #C7D2D6;
            text-shadow: 0 1px 0 rgba(0,0,0,.9);
        }
        .wordmark b { color: var(--phos); }
        .plugin-name {
            font-family: var(--font-mono); font-size: 12px; color: var(--engrave-dim);
            letter-spacing: .08em;
        }
        .verdict-badge {
            margin-left: auto;
            font-family: var(--font-mono); font-weight: 700; font-size: 13px;
            letter-spacing: .2em; text-transform: uppercase;
            padding: 7px 18px; border-radius: 4px;
            background: var(--glass);
            box-shadow: 0 2px 8px rgba(0,0,0,.6) inset;
        }
        .verdict-badge::before {
            content: ''; display: inline-block; width: 9px; height: 9px; border-radius: 50%;
            margin-right: 10px; vertical-align: 0;
            background: currentColor; box-shadow: 0 0 9px currentColor;
        }
        .badge-pass { color: var(--pass); }
        .badge-warn { color: var(--warn); }
        .badge-fail { color: var(--fail); }

        /* engraved section labels */
        h2.section {
            font-family: var(--font-mono);
            font-size: .68rem; text-transform: uppercase; letter-spacing: .28em;
            color: var(--engrave-dim); margin: 1.6rem 0 .7rem;
        }

        /* metric channels — styles the markup generated by pluginproof/report.py:
           .metric-card > .metric-name / .metric-values (.metric-baseline,
           .metric-arrow, .metric-current) / .metric-delta / .metric-status */
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 12px;
        }
        .metric-card {
            border-radius: 5px;
            padding: 1rem 1.15rem;
            background: radial-gradient(140% 160% at 50% 0%, #0b120c 0%, var(--glass) 65%);
            box-shadow: 0 3px 10px rgba(0,0,0,.55) inset, 0 1px 0 rgba(255,255,255,.04);
            position: relative; overflow: hidden;
        }
        .metric-card::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,.20) 0 1px, transparent 1px 3px);
        }
        .metric-card > * { position: relative; z-index: 1; }
        .metric-name {
            font-family: var(--font-mono); font-size: .68rem;
            text-transform: uppercase; letter-spacing: .18em;
            color: var(--phos-dim); margin-bottom: .55rem;
        }
        .metric-values {
            font-family: var(--font-mono); font-size: 1.15rem; font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--phos); text-shadow: 0 0 6px rgba(62,242,155,.4);
        }
        .metric-baseline { color: var(--phos-dim); text-shadow: none; }
        .metric-arrow { color: var(--phos-dim); padding: 0 .3rem; font-weight: 400; text-shadow: none; }
        .metric-delta {
            font-family: var(--font-mono); font-size: .82rem; margin-top: .45rem;
            font-variant-numeric: tabular-nums;
        }
        .metric-delta small { color: var(--engrave-dim); font-weight: 400; }
        .metric-status {
            font-family: var(--font-mono); font-size: .66rem; font-weight: 700;
            letter-spacing: .3em; margin-top: .5rem;
            text-shadow: 0 0 9px currentColor;
        }

        /* spectra — bezel + glass around report.py's figure.spectrum */
        .spectra { display: flex; flex-direction: column; gap: 14px; }
        figure.spectrum {
            border-radius: 8px; padding: 10px;
            background: linear-gradient(180deg, #0e1113, #181c1f);
            box-shadow: 0 1px 0 rgba(255,255,255,.05), 0 3px 10px rgba(0,0,0,.55) inset;
        }
        figure.spectrum img {
            width: 100%; height: auto; display: block; border-radius: 5px;
        }
        figure.spectrum figcaption {
            font-family: var(--font-mono); font-size: .72rem; letter-spacing: .14em;
            text-transform: uppercase; color: var(--engrave-dim); margin-top: .55rem;
            padding-left: 2px;
        }

        /* diagnosis — terminal readout on glass */
        .diagnosis-panel {
            border-radius: 8px; padding: 10px;
            background: linear-gradient(180deg, #0e1113, #181c1f);
            box-shadow: 0 1px 0 rgba(255,255,255,.05), 0 3px 10px rgba(0,0,0,.55) inset;
        }
        .diagnosis-inner {
            position: relative; border-radius: 5px; padding: 1.1rem 1.3rem;
            background: radial-gradient(140% 160% at 50% 0%, #0b120c 0%, var(--glass) 65%);
            overflow: hidden;
        }
        .diagnosis-inner::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,.20) 0 1px, transparent 1px 3px);
        }
        .diagnosis-inner > * { position: relative; z-index: 1; }
        .diagnosis-header {
            font-family: var(--font-mono); font-size: .68rem;
            letter-spacing: .24em; text-transform: uppercase;
            color: var(--phos-dim); margin-bottom: .7rem;
            padding-bottom: .6rem; border-bottom: 1px dashed rgba(62,242,155,.25);
        }
        .diagnosis-text {
            font-family: var(--font-mono); font-size: .92rem; line-height: 1.75;
            color: var(--phos); text-shadow: 0 0 6px rgba(62,242,155,.35);
        }

        footer.stamp {
            font-family: var(--font-mono); font-size: .68rem; letter-spacing: .12em;
            color: var(--engrave-dim); margin-top: 1.4rem; text-align: right;
        }

        @media (max-width: 900px)  { .metric-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 640px)  { .metric-grid { grid-template-columns: 1fr; }
                                     .verdict-badge { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 512 512">
                    <rect width="512" height="512" fill="#0F1115" rx="64"/>
                    <path d="M 256, 40 C 256, 40 400, 80 400, 200 C 400, 360 256, 460 256, 460 C 256, 460 112, 360 112, 200 C 112, 80 256, 40 256, 40 Z" fill="none" stroke="#2A303A" stroke-width="12" stroke-linejoin="round"/>
                    <rect x="170" y="240" width="16" height="80" rx="8" fill="#00FF9D" />
                    <rect x="210" y="200" width="16" height="120" rx="8" fill="#00FF9D" />
                    <rect x="250" y="140" width="16" height="180" rx="8" fill="#00FF9D" />
                    <path d="M 280, 260 L 310, 290 L 360, 180" fill="none" stroke="#00FF9D" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span class="wordmark">Plugin<b>Proof</b></span>
            </div>
            <div class="plugin-name">DUT: {{plugin_name}}</div>
            <div class="verdict-badge badge-{{overall_status_class}}">{{overall_status}}</div>
        </header>

        <h2 class="section">Metrics</h2>
        <div class="metric-grid">
{{metric_cards}}
        </div>

        <h2 class="section">Spectra</h2>
        <div class="spectra">
{{spectra}}
        </div>

        <h2 class="section">Diagnosis</h2>
        <div class="diagnosis-panel">
            <div class="diagnosis-inner">
                <div class="diagnosis-header">AI Diagnosis &mdash; {{diagnosis_engine}}</div>
                <div class="diagnosis-text">{{diagnosis}}</div>
            </div>
        </div>

        <footer class="stamp">PLUGINPROOF PP-01 &middot; generated {{timestamp}}</footer>
    </div>
</body>
</html>
