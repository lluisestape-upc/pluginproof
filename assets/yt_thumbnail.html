<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PluginProof YouTube thumbnail 1280x720</title>
<style>
  :root{
    --room:#101214; --chassis:#1B1F22; --chassis-hi:#2A3034; --chassis-lo:#0C0E10;
    --glass:#070B08; --phos:#3EF29B; --phos-dim:#1F8A58; --engrave:#9AA6A0;
    --engrave-dim:#5C666B; --fail:#FF4757;
    --mono:'Cascadia Code',Consolas,monospace; --label:'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:1280px;height:720px;overflow:hidden;background:var(--room);font-family:var(--label)}
  .unit{position:absolute;inset:22px;border-radius:14px;
    background:linear-gradient(180deg,var(--chassis-hi) 0%,var(--chassis) 6%,var(--chassis) 94%,var(--chassis-lo) 100%);
    box-shadow:0 24px 60px rgba(0,0,0,.65),0 2px 0 rgba(255,255,255,.05) inset;
    padding:30px 46px}
  .screw{position:absolute;width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#3a4146,#14171a 70%);
    box-shadow:0 1px 1px rgba(255,255,255,.06),0 0 3px rgba(0,0,0,.8) inset}
  .screw::after{content:'';position:absolute;left:3px;right:3px;top:7px;height:1.8px;
    background:#0a0c0d;transform:rotate(38deg)}
  .tl{top:13px;left:15px}.tr{top:13px;right:15px}.bl{bottom:13px;left:15px}.br{bottom:13px;right:15px}

  .plate{display:flex;align-items:center;gap:20px}
  .logo{width:64px;height:64px}
  .word{font-size:52px;font-weight:700;letter-spacing:.01em;color:#C7D2D6;text-shadow:0 1px 0 rgba(0,0,0,.9)}
  .word b{color:var(--phos)}
  .pwr{margin-left:auto;display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--phos);
    box-shadow:0 0 10px var(--phos)}

  .claim{margin-top:14px;font-size:44px;font-weight:700;line-height:1.15;color:#E8EEF1;
    text-shadow:0 2px 0 rgba(0,0,0,.8)}
  .claim b{color:var(--fail);text-shadow:0 0 18px rgba(255,71,87,.5)}

  .bezel{margin-top:22px;border-radius:12px;padding:13px;
    background:linear-gradient(180deg,#0e1113,#181c1f);
    box-shadow:0 1px 0 rgba(255,255,255,.05),0 3px 12px rgba(0,0,0,.55) inset}
  .crt{position:relative;border-radius:7px;height:432px;overflow:hidden;
    background:radial-gradient(120% 140% at 50% 10%,#0b120c 0%,var(--glass) 60%);
    box-shadow:0 0 26px rgba(0,0,0,.9) inset}
  .crt::before{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0 1px,transparent 1px 3px)}
  .crt::after{content:'';position:absolute;inset:0;
    background:radial-gradient(90% 75% at 50% 45%,transparent 55%,rgba(0,0,0,.5) 100%)}
  svg.plot{position:absolute;inset:0;width:100%;height:100%}
  .verdict{position:absolute;right:26px;top:22px;z-index:2;font-family:var(--mono);font-weight:700;
    font-size:34px;letter-spacing:.2em;color:var(--fail);text-shadow:0 0 16px rgba(255,71,87,.8)}
  .verdict::before{content:'';display:inline-block;width:20px;height:20px;border-radius:50%;
    background:var(--fail);box-shadow:0 0 16px var(--fail);margin-right:16px}
  .spike-label{position:absolute;z-index:2;font-family:var(--mono);font-size:22px;font-weight:700;
    letter-spacing:.04em;color:var(--fail);text-shadow:0 0 10px rgba(255,71,87,.7);right:120px;bottom:64px}
</style>
</head>
<body>
<div class="unit">
  <span class="screw tl"></span><span class="screw tr"></span><span class="screw bl"></span><span class="screw br"></span>
  <div class="plate">

      <rect width="512" height="512" fill="#0F1115" rx="64"/>

      <rect x="170" y="240" width="16" height="80" rx="8" fill="#00FF9D"/>
      <rect x="210" y="200" width="16" height="120" rx="8" fill="#00FF9D"/>
      <rect x="250" y="140" width="16" height="180" rx="8" fill="#00FF9D"/>

    <span class="word">Plugin<b>Proof</b></span>
    <span class="pwr"></span>

  <div class="claim">Catch <b>audio bugs</b> before your users do</div>

  <div class="bezel"><div class="crt">

        <line x1="114" y1="0" x2="114" y2="330"/><line x1="228" y1="0" x2="228" y2="330"/>
        <line x1="342" y1="0" x2="342" y2="330"/><line x1="456" y1="0" x2="456" y2="330"/>
        <line x1="570" y1="0" x2="570" y2="330"/><line x1="684" y1="0" x2="684" y2="330"/>
        <line x1="798" y1="0" x2="798" y2="330"/><line x1="912" y1="0" x2="912" y2="330"/>
        <line x1="1026" y1="0" x2="1026" y2="330"/>
      </g>
      <path d="M0,262 L132,260 L220,263 L308,258 L374,262 L430,132 L444,57 L458,132 L516,260 L616,262 L704,260 L792,263 L880,261 L968,263 L1056,261 L1140,263"
            fill="none" stroke="#5C666B" stroke-width="3" stroke-dasharray="8 7" opacity=".8"/>
      <path d="M0,260 L132,257 L220,261 L308,256 L374,260 L430,130 L444,55 L458,130 L516,257 L594,260
               L660,255 L704,220 L721,132 L730,229 L757,165 L770,244 L796,106 L810,235 L836,141 L849,240
               L875,97 L889,227 L915,154 L928,238 L954,81 L968,220 L994,165 L1008,233 L1034,119 L1047,229 L1074,183 L1100,235 L1140,233"
            fill="none" stroke="#3EF29B" stroke-width="3.5"
            style="filter:drop-shadow(0 0 6px rgba(62,242,155,.6))"/>
      <path d="M704,220 L721,132 L730,229 L757,165 L770,244 L796,106 L810,235 L836,141 L849,240
               L875,97 L889,227 L915,154 L928,238 L954,81 L968,220 L994,165 L1008,233 L1034,119 L1047,229"
            fill="none" stroke="#FF4757" stroke-width="3.5" opacity=".9"
            style="filter:drop-shadow(0 0 9px rgba(255,71,87,.7))"/>
    </svg>
    <div class="verdict">FAIL</div>
    <div class="spike-label">ALIASING Δ +78.5 dB</div>
  </div></div>
</div>
</body>
</html>
